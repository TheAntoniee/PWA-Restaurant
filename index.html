<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>Restaurante PWA</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
</head>
<body>
    <header>
        <h1>Gestión de Restaurante</h1>
        <div id="status-badge" class="online">Online</div>
    </header>

    <main class="dashboard">
        <section class="card">
            <h2>Cocina</h2>
            <form id="dish-form">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <select id="tipo">
                    <option value="caliente">Caliente</option>
                    <option value="frio">Frío</option>
                    <option value="rapido">Rápido</option>
                </select>
                <input type="number" id="prioridad" placeholder="Prioridad" required>
                <button type="submit">Enviar</button>
            </form>
        </section>

        <section class="card">
            <h2>Mostrador</h2>
            <button onclick="consume('caliente')">Caliente</button>
            <button onclick="consume('frio')">Frío</button>
            <button onclick="consume('rapido')">Rápido</button>
            <div id="last-order"></div>
        </section>

        <section class="card wide">
            <h2>Estado</h2>
            <div id="queue-state">Cargando...</div>
        </section>

        <section class="card wide">
            <h2>Estadísticas</h2>
            <div id="stats-display" class="stats-grid"></div>
        </section>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/register-sw.js"></script>
</body>
</html>
